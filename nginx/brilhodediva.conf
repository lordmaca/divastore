# Brilho de Diva — storefront nginx server block.
#
# DEPLOY:
#   sudo cp nginx/brilhodediva.conf /etc/nginx/sites-available/brilhodediva
#   sudo ln -sf /etc/nginx/sites-available/brilhodediva /etc/nginx/sites-enabled/brilhodediva
#   sudo nginx -t   # MUST succeed; verifies DivaHub's block still parses too
#   sudo systemctl reload nginx
#   sudo certbot --nginx -d loja.brilhodediva.com.br
#
# IMPORTANT — Safe Harbor:
#   - Never edit /etc/nginx/sites-available/divahub.
#   - Never include the divahub.brilhodediva.com.br hostname in any certbot run
#     for this site; DivaHub's cert is managed independently.
#   - After reload, verify  curl -I https://divahub.brilhodediva.com.br  still 200s/307s.

server {
    listen 80;
    listen [::]:80;
    server_name loja.brilhodediva.com.br;

    # Certbot writes ACME challenge files into the webroot at /var/www/html.
    # Once cert is issued, certbot will inject the 443 server block below it.

    location / {
        proxy_pass         http://127.0.0.1:3001;
        proxy_http_version 1.1;
        proxy_set_header   Upgrade           $http_upgrade;
        proxy_set_header   Connection        upgrade;
        proxy_set_header   Host              $host;
        proxy_set_header   X-Real-IP         $remote_addr;
        proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header   X-Forwarded-Proto $scheme;
        proxy_set_header   X-Forwarded-Host  $host;
    }
}
