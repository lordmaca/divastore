# Brilho de Diva — apex + www → canonical (loja.brilhodediva.com.br) redirect.
#
# The storefront ships under loja.brilhodediva.com.br (that's SITE_URL, every
# canonical tag, and every JSON-LD @id). www + apex exist only to catch users
# who type the short form; they 301 to the canonical host.
#
# DEPLOY:
#   sudo cp nginx/brilhodediva-redirect.conf /etc/nginx/sites-available/brilhodediva-redirect
#   sudo ln -sf /etc/nginx/sites-available/brilhodediva-redirect /etc/nginx/sites-enabled/brilhodediva-redirect
#   sudo nginx -t && sudo systemctl reload nginx
#   sudo certbot --nginx -d brilhodediva.com.br -d www.brilhodediva.com.br
#
# Safe Harbor: never include divahub.brilhodediva.com.br in the certbot run.

server {
    server_name brilhodediva.com.br www.brilhodediva.com.br;

    # ACME challenge lives at the default webroot; everything else redirects.
    location /.well-known/acme-challenge/ {
        root /var/www/html;
    }

    location / {
        return 301 https://loja.brilhodediva.com.br$request_uri;
    }

    listen [::]:443 ssl; # managed by Certbot
    listen 443 ssl; # managed by Certbot
    ssl_certificate /etc/letsencrypt/live/brilhodediva.com.br/fullchain.pem; # managed by Certbot
    ssl_certificate_key /etc/letsencrypt/live/brilhodediva.com.br/privkey.pem; # managed by Certbot
    include /etc/letsencrypt/options-ssl-nginx.conf; # managed by Certbot
    ssl_dhparam /etc/letsencrypt/ssl-dhparams.pem; # managed by Certbot


}


server {
    if ($host = www.brilhodediva.com.br) {
        return 301 https://$host$request_uri;
    } # managed by Certbot


    if ($host = brilhodediva.com.br) {
        return 301 https://$host$request_uri;
    } # managed by Certbot


    listen 80;
    listen [::]:80;
    server_name brilhodediva.com.br www.brilhodediva.com.br;
    return 404; # managed by Certbot




}